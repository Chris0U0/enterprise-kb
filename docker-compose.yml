services:
  # ── PostgreSQL 16 ──────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: kb-postgres
    environment:
      POSTGRES_DB: enterprise_kb
      POSTGRES_USER: kb_admin
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    # 避免与本机已安装的 PostgreSQL（常见占用 5432）冲突，导致连错库且中文错误信息触发 psycopg2 解码异常
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/01_init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kb_admin -d enterprise_kb"]
      interval: 5s
      retries: 5

  # ── Qdrant 向量数据库 ──────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.12.1
    container_name: kb-qdrant
    ports:
      - "6333:6333"   # REST
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334

  # ── MinIO 对象存储 ─────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: kb-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Console
    volumes:
      - minio_data:/data

  # ── Redis 7 ────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: kb-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Gotenberg 8 (Office 转 PDF 微服务) ────────────────────────
  gotenberg:
    image: gotenberg/gotenberg:8
    container_name: kb-gotenberg
    ports:
      - "3005:3000"  # 外部映射为 3005，避免与前端 3000 冲突
    restart: always

  # FastAPI / Celery 不在此编排（避免构建 python-deps 镜像）。
  # 宿主机: uvicorn app.main:app --reload --port 8000
  # 需要异步文档处理时本机:
  #   celery -A app.core.celery_app worker --loglevel=info --concurrency=2
  # 需要每日 RAGAS 评估定时任务时本机:
  #   celery -A app.core.celery_app beat --loglevel=info
  # .env 中需将 POSTGRES_* / REDIS_* / QDRANT_* / MINIO_* 指向 localhost 与 compose 映射端口（如 PG 5433）。

volumes:
  pgdata:
  qdrant_data:
  minio_data:
  redis_data:
