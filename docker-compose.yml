services:
  # ── PostgreSQL 16 ──────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: kb-postgres
    environment:
      POSTGRES_DB: enterprise_kb
      POSTGRES_USER: kb_admin
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    # 避免与本机已安装的 PostgreSQL（常见占用 5432）冲突，导致连错库且中文错误信息触发 psycopg2 解码异常
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/01_init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kb_admin -d enterprise_kb"]
      interval: 5s
      retries: 5

  # ── Qdrant 向量数据库 ──────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.12.1
    container_name: kb-qdrant
    ports:
      - "6333:6333"   # REST
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334

  # ── MinIO 对象存储 ─────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: kb-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Console
    volumes:
      - minio_data:/data

  # ── Redis 7 ────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: kb-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # ── Phase 3: Celery Worker ─────────────────────────────────
  celery-worker:
    build: .
    container_name: kb-celery-worker
    command: celery -A app.core.celery_app worker --loglevel=info --concurrency=2
    depends_on:
      - redis
      - postgres
      - qdrant
      - minio
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
    volumes:
      - kuzu_data:/data/kuzu_db

  # ── Phase 3: Celery Beat (定时任务调度) ────────────────────
  celery-beat:
    build: .
    container_name: kb-celery-beat
    command: celery -A app.core.celery_app beat --loglevel=info
    depends_on:
      - redis
      - postgres
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"

volumes:
  pgdata:
  qdrant_data:
  minio_data:
  redis_data:
  kuzu_data:
